<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY IS OVER CONTINUE?</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=KoPub+Batang:wght@400;700&family=Press+Start+2P&family=Noto+Serif+KR:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 노란색을 완전히 뺀 청회색 & 은색 오리엔탈 팔레트 */
            --bg-deep: #030812;
            --oriental-blue: #1e3a5f;
            --silver-ink: #b8c6db;
            --accent-blue: #5a8bbd;
            --text-main: #e1e7f0;
            --font-serif: 'KoPub Batang', 'Noto Serif KR', serif; 
            --font-pixel: 'Press Start 2P', cursive;
        }

        body { 
            font-family: var(--font-serif); 
            background-color: var(--bg-deep); 
            /* 수묵 파도와 전통 문양이 겹쳐진 어두운 배경 */
            background-image: 
                linear-gradient(to bottom, rgba(3, 8, 18, 0.9), rgba(3, 8, 18, 0.95)),
                url('https://www.transparenttextures.com/patterns/oriental-tiles.png'),
                url('https://www.transparenttextures.com/patterns/waves.png');
            background-repeat: repeat;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; color: var(--text-main); 
            overflow: hidden; 
        }

        /* 전통 창살(격자) 프레임 디테일 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 25px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/60-lines.png') 30 stretch;
            opacity: 0.1; pointer-events: none; z-index: 5;
        }

        .card { 
            background: rgba(15, 30, 55, 0.4);
            backdrop-filter: blur(12px);
            padding: 60px 45px; 
            /* 은색 자개 느낌의 테두리 */
            border: 1px solid rgba(184, 198, 219, 0.2);
            box-shadow: 0 0 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(90, 139, 189, 0.1);
            max-width: 580px; width: 100%; text-align: center; 
            position: relative; overflow: hidden; min-height: 520px; 
            display: flex; flex-direction: column; justify-content: center; 
        }

        /* 코너 매화/꽃 장식 */
        .card::after {
            content: "";
            position: absolute; bottom: -20px; right: -20px;
            width: 120px; height: 120px;
            background-image: url('https://www.transparenttextures.com/patterns/p5.png');
            opacity: 0.15; filter: invert(1); pointer-events: none;
        }

        .pixel-title { font-family: var(--font-pixel); font-size: 24px; color: var(--accent-blue); line-height: 1.8; margin-bottom: 45px; }
        .pixel-continue { font-size: 13px; color: var(--silver-ink); display: block; margin-top: 15px; }
        .pixel-yes-btn { font-family: var(--font-pixel); background: transparent; font-size: 20px; color: var(--text-main); cursor: pointer; border: none; transition: 0.3s; margin-top: 20px; }
        .pixel-yes-btn:hover { color: var(--accent-blue); transform: scale(1.1); }

        .fade-step { opacity: 0; transform: translateY(15px); transition: 1.2s ease; margin-bottom: 25px; line-height: 1.9; word-break: keep-all; font-weight: 300; }
        .fade-step.active { opacity: 1; transform: translateY(0); }
        
        .q-id { font-size: 32px; font-weight: 700; color: var(--accent-blue); margin-bottom: 20px; opacity: 0.9; }
        .content-area { font-size: 17.5px; margin-bottom: 35px; color: var(--text-main); line-height: 1.8; }
        
        input, textarea { 
            width: 100%; padding: 16px; 
            border: none; border-bottom: 1px solid var(--oriental-blue);
            background: rgba(255,255,255,0.03);
            font-size: 16px; outline: none; transition: 0.3s; 
            box-sizing: border-box; font-family: var(--font-serif); color: var(--text-main);
        }
        input:focus, textarea:focus { border-bottom: 1px solid var(--accent-blue); background: rgba(90, 139, 189, 0.05); }
        textarea { height: 170px; resize: none; border: 1px solid var(--oriental-blue); }

        /* 입력 예시(Placeholder) 원복 */
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.2); }

        .btn { 
            background: var(--oriental-blue); color: var(--text-main); 
            border: 1px solid var(--accent-blue); padding: 16px; 
            font-size: 16px; cursor: pointer; width: 100%; transition: 0.4s;
            letter-spacing: 2px;
        }
        .btn:hover { background: var(--accent-blue); color: var(--bg-deep); }
        .btn-prev { background: transparent; color: rgba(255,255,255,0.3); margin-top: 15px; border: none; cursor: pointer; text-decoration: underline; }

        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; opacity: 0; visibility: hidden; transition: 0.6s; }
        #loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-bar-fill { width: 0%; height: 2px; background: var(--accent-blue); transition: 0.2s; margin-top: 20px; box-shadow: 0 0 10px var(--accent-blue); }
        
        .hidden { display: none !important; }
        .error-message { color: #ff5e5e; font-size: 14px; margin-top: 10px; display: none; } /* */
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="loading-overlay">
        <div style="letter-spacing: 3px; color: var(--silver-ink);">신원 확인을 시작합니다⋯⋯.</div>
        <div style="width: 160px; height: 1px; background: rgba(255,255,255,0.1); margin-top: 25px;">
            <div class="loading-bar-fill" id="loading-fill"></div>
        </div>
    </div>

    <div id="intro-section">
        <div class="pixel-title">STORY IS OVER<br><span class="pixel-continue">CONTINUE?</span></div>
        <button class="pixel-yes-btn" onclick="showNotice()">▶ YES</button>
    </div>

    <div id="notice-section" class="hidden" onclick="startQuiz()" style="cursor: pointer;">
        <div class="fade-step" id="p1">도서관에 재방문해 주신 모든 분들께 진심으로 감사드립니다.</div>
        <div class="fade-step" id="p2">본 설문은 원활한 Beyond the LAST TOME (PART. 2)를 위해 마련되었습니다.<br>설문은 총 여덟 문항으로 구성됩니다.</div>
        <div class="fade-step" id="p3">최초 가입 수락은 28일 자정에 이루어질 예정입니다.<br>27일 23시까지 응답을 완료해 주시기 바랍니다.</div>
        <div class="fade-step" id="p4" style="color: var(--accent-blue);">가입 시 닉네임을 '도'로 시작하는 단어로 설정해 주세요.</div>
        <div style="margin-top: 40px; font-size: 12px; color: var(--silver-ink); opacity: 0.4;">화면을 클릭하여 계속합니다.</div>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="morph-wrapper">
            <div class="q-id" id="display-id"></div>
            <div class="content-area" id="display-text"></div>
            <div id="input-container"></div>
            <div id="error-msg" class="error-message"></div>
        </div>
        <div style="margin-top: 35px;">
            <button class="btn" id="next-btn" onclick="handleNext()">기록하기</button>
            <button class="btn-prev" onclick="handlePrev()">이전으로</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhjvb9QK9hbVmNi096NVxiegNwF1MBieS_KZfdEnSKCGmWQ3l_he7ITUKvhWYz8Fyq/exec"; 
    const FINAL_REDIRECT = "https://band.us/n/a3acbc407fwcU";

    /* 입력 예시(Placeholder) 원복 */
    const QUESTIONS = [
        { id: "0.", text: "본인의 트위터 아이디를 기입해 주세요.", placeholder: "ex. @BeforetheLASTTOME", type: "input", required: true },
        { id: "1.", text: "주요 인물의 본명(풀네임)을 기입해 주세요.<br><small style='font-size:12px;opacity:0.7;'>가명 혹은 애칭은 괄호로 구분해 주세요.</small>", placeholder: "ex. 신운제 (운제띠니)", type: "input", answers: ["하루키", "라울", "권은수", "한도혁", "아키라", "렌", "윤아선", "유안", "유", "안", "므르쉐", "케노비", "늘솔길", "에이사", "홀리스", "이반", "마티아", "이청춘", "일주", "한이레", "도미닉", "일라이", "윤정혁", "강 설", "강", "설", "버티", "령", "진", "제유영", "레온", "리온", "다니엘", "에반", "유해솔", "오우진", "그레디", "이믿음", "이제"], required: true },
        { id: "2.", text: "주요 인물의 나이를 기입해 주세요.", placeholder: "ex. 29", type: "input", required: true },
        { id: "3.", text: "주요 인물의 신장을 기입해 주세요.<br><small style='font-size:12px;opacity:0.7;'>모호한 표현 대신 정확한 수치를 지향합니다.</small>", placeholder: "ex. 180cm, 70kg", type: "input", required: true },
        { id: "4.", text: "Beyond the LAST TOME (PART. 1)에서 제출하였던 가장 좋아하는 이야기를 기입해 주세요.<br><small style='font-size:12px;opacity:0.7;'>기억이 나지 않는다면 생략하셔도 괜찮습니다.</small>", placeholder: "ex. 인어공주", type: "input", required: true },
        { id: "5.", text: "Beyond the LAST TOME (PART. 1) 주요 인물의 개인 서사를 간단하게 요약해 주세요.<br><small style='font-size:12px;opacity:0.7;'>필수 입력 항목이며, 자세하게 기입할수록 더욱 만족스러운 러닝이 되실 수 있습니다.</small>", placeholder: "요약을 이곳에 기록하십시오.", type: "textarea", required: true },
        { id: "6.", text: "모든 주요 인물은 도합 30 의 기능치를 가지고 있습니다. <br>해당 기능치를 [체력], [근력], [민첩], [기억]에 나누어 주세요.<br><small style='font-size:12px;opacity:0.7;'>총합 30 이하 권장 (항목 구분 필수)</small>", placeholder: "ex. 체력 3, 근력 4, 민첩 17, 기억 0", type: "input", required: true },
        { id: "7.", text: "사서들에게 하고 싶은 말을 작성해 주세요. 어떠한 종류이든 괜찮습니다.<br><small style='font-size:12px;opacity:0.7;'>공란으로 두어도 제출 가능합니다.</small>", placeholder: "응답을 마친 후 다음 페이지로 넘어가면 기록이 제출됩니다.", type: "textarea", required: false }
    ];

    let currentIdx = 0;
    let userAnswers = {};

    function showNotice() {
        document.getElementById('intro-section').classList.add('hidden');
        const notice = document.getElementById('notice-section');
        notice.classList.remove('hidden');
        ['p1', 'p2', 'p3', 'p4'].forEach((id, i) => {
            setTimeout(() => document.getElementById(id).classList.add('active'), 600 * i);
        });
    }

    function startQuiz() {
        document.getElementById('notice-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        updateView();
    }

    function updateView() {
        const q = QUESTIONS[currentIdx];
        document.getElementById('display-id').innerText = q.id;
        document.getElementById('display-text').innerHTML = q.text;
        
        const container = document.getElementById('input-container');
        container.innerHTML = "";
        const inputEl = document.createElement(q.type === 'textarea' ? 'textarea' : 'input');
        inputEl.id = "answer-field";
        inputEl.placeholder = q.placeholder;
        inputEl.value = userAnswers[`q${currentIdx}`] || "";
        container.appendChild(inputEl);
        
        document.getElementById('next-btn').innerText = (currentIdx === QUESTIONS.length - 1) ? "기록을 마칩니다." : "기록하기";
        document.getElementById('error-msg').style.display = 'none';
    }

    function handleNext() {
        const val = document.getElementById('answer-field').value.trim();
        if (QUESTIONS[currentIdx].required && !val) { alert("내용을 입력해 주세요."); return; }
        
        if (currentIdx === 1) {
            const isCorrect = QUESTIONS[1].answers.some(ans => val.includes(ans));
            if (!isCorrect) { 
                const err = document.getElementById('error-msg');
                err.style.display = 'block'; 
                err.innerText = "주요 인물이 아닙니다. 다시 입력해 주세요."; /* */
                return; 
            }
        }

        userAnswers[`q${currentIdx}`] = val;
        if (currentIdx === 0) {
            runLoading(() => { currentIdx++; updateView(); });
        } else if (currentIdx < QUESTIONS.length - 1) {
            currentIdx++; updateView();
        } else {
            submit();
        }
    }

    function runLoading(cb) {
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('active');
        let p = 0;
        const fill = document.getElementById('loading-fill');
        const iv = setInterval(() => {
            p += 10;
            fill.style.width = p + "%";
            if (p >= 100) { clearInterval(iv); setTimeout(() => { overlay.classList.remove('active'); cb(); }, 400); }
        }, 120);
    }

    function submit() {
        const btn = document.getElementById('next-btn');
        btn.innerText = "서고에 기록 중⋯";
        btn.disabled = true;
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(userAnswers) })
        .then(() => location.href = FINAL_REDIRECT);
    }

    function handlePrev() { if (currentIdx > 0) { currentIdx--; updateView(); } }
</script>
</body>
</html>
